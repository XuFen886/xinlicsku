<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你的测试结果 - 心流测试</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-2xl mx-auto p-6 pt-12">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-indigo-700 mb-3">你的测试结果</h1>
      <p id="type" class="text-5xl font-bold text-gray-800"></p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-10 mb-8">
      <h2 class="text-2xl font-bold mb-6">结果解读</h2>
      <div id="description" class="text-lg leading-relaxed text-gray-700"></div>
    </div>

    <a href="test.html" class="block text-center py-4 bg-indigo-600 text-white rounded-2xl font-bold text-lg mb-3">
      重新测试
    </a>
    <a href="index.html" class="block text-center py-4 text-gray-600">
      返回首页
    </a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const score = parseInt(params.get('score')) || 50;

    let type = "平衡型人格";
    let desc = "你在内向与外向之间比较平衡，既能享受独处，也能适应社交。";

    if (score >= 75) {
      type = "外向领袖型 (E)";
      desc = "你充满能量，喜欢与人互动，擅长表达和领导。适合销售、管理、教学等工作。";
    } else if (score >= 50) {
      type = "活跃社交型";
      desc = "你热情开朗，容易结交朋友，是人群中的焦点。";
    } else {
      type = "内向思考型 (I)";
      desc = "你更喜欢安静的环境，思考深刻，创造力强。适合研究、写作、设计等工作。";
    }

    document.getElementById('type').textContent = type;
    document.getElementById('description').innerHTML = desc;
  </script>
</body>
</html>

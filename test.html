<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 人格测试 - 心流测试</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-2xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <a href="index.html" class="text-indigo-600 hover:text-indigo-800 flex items-center gap-1">
        ← 返回首页
      </a>
      <div class="font-bold text-xl">MBTI 16型人格测试</div>
      <div id="progress-text" class="text-sm text-gray-500">1/12</div>
    </div>

    <!-- 进度条 -->
    <div class="h-2 bg-gray-200 rounded-full mb-8">
      <div id="progress-bar" class="h-2 bg-indigo-600 rounded-full w-1/12 transition-all"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8 md:p-10">
      <h2 id="question-text" class="text-xl md:text-2xl leading-relaxed text-gray-800 mb-10 text-center">
        在社交聚会中，你通常感觉如何？
      </h2>

      <div class="space-y-4">
        <button onclick="answer(1)" 
                class="w-full text-left p-6 border-2 border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 rounded-2xl text-lg transition">
          A. 感觉很兴奋，喜欢和很多人聊天
        </button>
        <button onclick="answer(0)" 
                class="w-full text-left p-6 border-2 border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 rounded-2xl text-lg transition">
          B. 感觉有点累，更喜欢和小圈子深入聊天
        </button>
      </div>
    </div>

    <p class="text-center text-gray-400 mt-8 text-sm">测试仅供娱乐 · 结果基于心理学量表</p>
  </div>

  <script>
    let currentQuestion = 0;
    let totalScore = 0;
    
    const questions = [
      "在社交聚会中，你通常感觉如何？",
      "你更喜欢通过什么方式获取信息？",
      "做决定时，你主要依靠？",
      "你更倾向于过怎样的生活？",
      "参加派对时，你通常？",
      "面对新想法，你的态度是？",
      "工作时，你更喜欢？",
      "你如何看待规则？",
      "休息时，你更喜欢？",
      "面对压力，你倾向于？",
      "你更喜欢和什么类型的人相处？",
      "你对未来的规划通常？"
    ];

    function answer(score) {
      totalScore += score;
      currentQuestion++;
      
      if (currentQuestion >= questions.length) {
        // 跳转到结果页
        window.location.href = `result.html?score=${totalScore}`;
      } else {
        // 显示下一题
        document.getElementById('question-text').textContent = questions[currentQuestion];
        document.getElementById('progress-text').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
      }
    }
  </script>
</body>
</html>

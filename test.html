<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 人格测试 - 心流测试</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-2xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <a href="index.html" class="text-indigo-600 hover:text-indigo-800 flex items-center gap-1">
        ← 返回首页
      </a>
      <div class="font-bold text-xl">MBTI 16型人格测试</div>
      <div id="progress-text" class="text-sm text-gray-500">1/12</div>
    </div>

    <!-- 进度条 -->
    <div class="h-2 bg-gray-200 rounded-full mb-8">
      <div id="progress-bar" class="h-2 bg-indigo-600 rounded-full w-1/12 transition-all duration-300"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8 md:p-10">
      <h2 id="question-text" class="text-xl md:text-2xl leading-relaxed text-gray-800 mb-10 text-center">
        在社交聚会中，你通常感觉如何？
      </h2>

      <div class="space-y-4" id="options">
        <!-- 选项会由JS动态生成 -->
      </div>
    </div>

    <p class="text-center text-gray-400 mt-8 text-sm">测试仅供娱乐 · 结果基于心理学量表</p>
  </div>

  <script>
    let currentQuestion = 0;
    let totalScore = 0;
    
    const questions = [
      { q: "在社交聚会中，你通常感觉如何？", a: "感觉很兴奋，喜欢和很多人聊天", b: "感觉有点累，更喜欢和小圈子深入聊天" },
      { q: "你更喜欢通过什么方式获取信息？", a: "亲身体验和实际操作", b: "阅读资料和理论分析" },
      { q: "做决定时，你主要依靠？", a: "逻辑分析和客观事实", b: "个人价值观和他人感受" },
      { q: "你更倾向于过怎样的生活？", a: "有计划、有条理的生活", b: "灵活自由、随性而为的生活" },
      { q: "参加派对时，你通常？", a: "主动认识很多新朋友", b: "和熟悉的朋友待在一起" },
      { q: "面对新想法，你的态度是？", a: "立刻尝试，很有兴趣", b: "需要时间思考和观察" },
      { q: "工作时，你更喜欢？", a: "同时处理多个任务", b: "专注完成一个任务" },
      { q: "你如何看待规则？", a: "规则很重要，必须遵守", b: "规则可以根据情况灵活调整" },
      { q: "休息时，你更喜欢？", a: "和朋友出去玩", b: "一个人安静地待着" },
      { q: "面对压力，你倾向于？", a: "和别人讨论倾诉", b: "自己思考消化" },
      { q: "你更喜欢和什么类型的人相处？", a: "热情外向的人", b: "安静有深度的人" },
      { q: "你对未来的规划通常？", a: "做好详细计划", b: "走一步看一步" }
    ];

    function loadQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('question-text').textContent = q.q;
      document.getElementById('progress-text').textContent = `${currentQuestion + 1}/${questions.length}`;
      document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;

      const optionsHTML = `
        <button onclick="answer(1)" class="w-full text-left p-6 border-2 border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 rounded-2xl text-lg transition">
          A. ${q.a}
        </button>
        <button onclick="answer(0)" class="w-full text-left p-6 border-2 border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 rounded-2xl text-lg transition">
          B. ${q.b}
        </button>
      `;
      document.getElementById('options').innerHTML = optionsHTML;
    }

    function answer(score) {
      totalScore += score;
      currentQuestion++;
      
      if (currentQuestion >= questions.length) {
        window.location.href = `result.html?score=${totalScore}`;
      } else {
        loadQuestion();
      }
    }

    //

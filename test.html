<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 16型人格测试 - 心流测试</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-2xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <a href="index.html" class="text-indigo-600 hover:text-indigo-800">← 返回首页</a>
      <div class="text-xl font-bold text-gray-800">MBTI 人格测试</div>
      <div class="text-sm text-gray-500">1/20</div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-10">
      <div class="text-center mb-10">
        <h2 class="text-2xl font-bold mb-4">问题 1 / 20</h2>
        <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
          <div class="h-2 bg-indigo-600 w-1/20 rounded-full"></div>
        </div>
      </div>

      <p class="text-xl leading-relaxed text-gray-700 mb-12 text-center">
        在社交聚会中，你通常更喜欢：
      </p>

      <div class="space-y-4">
        <button onclick="nextQuestion(1)" 
                class="w-full text-left p-6 border-2 border-gray-200 hover:border-indigo-500 rounded-2xl text-lg transition">
          A. 和很多人聊天，感觉很兴奋
        </button>
        <button onclick="nextQuestion(2)" 
                class="w-full text-left p-6 border-2 border-gray-200 hover:border-indigo-500 rounded-2xl text-lg transition">
          B. 只和少数熟悉的人深入交流
        </button>
      </div>
    </div>

    <p class="text-center text-gray-400 mt-8">测试仅供娱乐参考</p>
  </div>

  <script>
    let score = 0;
    function nextQuestion(value) {
      score += value;
      alert("这是演示版本\n\n下一题正在开发中...\n\n当前得分：" + score);
      // 实际项目中这里会跳转到下一题
    }
  </script>
</body>
</html>
